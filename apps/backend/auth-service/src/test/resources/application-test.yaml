spring:
  application:
    name: auth-service
  output:
    ansi:
      enabled: always

  # Handling 404 error
  web:
    resources:
      add-mappings: false

  # For Security Config + Keycloak
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/booking-app-realm

    # Jpa - point at the community SQLite dialect, same as application-dev.yaml
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        database-platform: org.hibernate.community.dialect.SQLiteDialect
        jdbc:
          time_zone: UTC

    # Database (SQLite, in-memory, shared across the connection pool so every
    # connection in the Hikari pool sees the same schema/data for the test JVM)
  datasource:
    url: jdbc:sqlite:file::memory:?cache=shared
    driver-class-name: org.sqlite.JDBC
    username: ""
    password: ""
    hikari:
      maximum-pool-size: 1
      connection-timeout: 30000

    # Flyway - Sqlite, run against the same in-memory database as above
  flyway:
    enabled: true
    baseline-on-migrate: true
    url: jdbc:sqlite:file::memory:?cache=shared
    driver-class-name: org.sqlite.JDBC
    user:
    password:
    locations: classpath:db/migration/sqlite

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 60000

server:
  port:
    8082

eureka:
  client:
    fetch-registry: false
    register-with-eureka: false
    enabled: false

logging:
  level:
    org:
      keycloak: DEBUG
      springframework:
        security: DEBUG

resilience4j:
  circuitbreaker:
    instances:
      keycloakAdmin:
        # Circuit opens if 50% of calls in the last 10 seconds fail
        sliding-window-type: TIME_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
  retry:
    instances:
      keycloakAdmin:
        max-attempts: 3
        wait-duration: 1s
  bulkhead:
    instances:
      keycloakAdmin:
        max-concurrent-calls: 5      # At most 5 concurrent calls to Keycloak
        max-wait-duration: 1s        # Fail fast if no semaphore permit available within 1 second
  ratelimiter:
    instances:
      globalRateLimiter:
        limit-for-period: 3
        limit-refresh-period: 60m
        timeout-duration: 0s

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:8080
  frontend-url: http://localhost:3000   # or your frontend URL

keycloak:
  admin:
    server-url: http://localhost:8081
    username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    password: ${KEYCLOAK_ADMIN_SECRET:admin}
    realm: booking-app-realm
  realm: booking-app-realm
  client-id: auth-service
  client-secret: ${KEYCLOAK_CLIENT_SECRET:your-client-secret-here}
  server-url: http://localhost:8081

token:
  cookie:
    name: refresh_token
    max-age: 86400
    secure: false
  refresh:
    expiration: 86400

otp:
  length: 6
  expiry-minutes: 5
  max-attempts: 3

google:
  oauth:
    client-id: test-google-client-id.apps.googleusercontent.com

password:
  min-length: 8
  reset:
      token-expiry-minutes: 60

account:
  lockout:
    max-attempts: 5
    duration-minutes: 30

