spring:
  application:
    name: flight-service
  output:
    ansi:
      enabled: always

  # Handling 404 error
  web:
    resources:
      add-mappings: false

  # For Security Config + Keycloak
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://127.0.0.1:8081/realms/booking-app-realm

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 60000

  redis:
    host: localhost
    port: 6379
    password:
    timeout: 60000

  # Jpa
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        database-platform: org.hibernate.community.dialect.SQLiteDialect
        jdbc:
          time_zone: UTC

    # Database (SQLite)
  datasource:
    url: jdbc:sqlite:booking-flight.db
    driver-class-name: org.sqlite.JDBC
    username: ""
    password: ""
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

    # Flyway - Sqlite
  flyway:
    enabled: true
    baseline-on-migrate: true
    url: jdbc:sqlite:booking-flight.db
    driver-class-name: org.sqlite.JDBC
    user:
    password:
    locations: classpath:db/migration/sqlite

server:
  port:
    8084

eureka:
  client:
    service-url:
      defaultZone: http://127.0.0.1:8761/eureka
    fetch-registry: true
    register-with-eureka: true
    enabled: true
    registry-fetch-interval-seconds: 5
    initial-instance-info-replication-interval-seconds: 5
  instance:
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10

logging:
  level:
    org:
      keycloak: DEBUG
      springframework:
        security: DEBUG

resilience4j:
#  circuitbreaker:
#    instances:

#  retry:
#    instances:

#  bulkhead:
#    instances:

  ratelimiter:
    instances:
      globalRateLimiter:
        limit-for-period: 10
        limit-refresh-period: 1m
        timeout-duration: 0s

app:
  cors:
    allowed-origins:
      - http://127.0.0.1:3000
      - http://127.0.0.1:8080

keycloak:
  realm: booking-app-realm
  client-id: flight-service
  client-secret: ${KEYCLOAK_CLIENT_SECRET:your-client-secret-here}
  server-url: http://127.0.0.1:8081

