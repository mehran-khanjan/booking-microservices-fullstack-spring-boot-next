services:
  postgres-keycloak:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME_KEYCLOAK:-postgres-container}
    environment:
      POSTGRES_DB: ${POSTGRES_DB_NAME_KEYCLOAK:-keycloak}
      POSTGRES_USER: ${POSTGRES_USER_KEYCLOAK:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_KEYCLOAK:-admin}
    ports:
      - "5432:5432"
    # Define in the dev file
    #    volumes:
    #      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:4.3.1-management-alpine
    container_name: ${RABBITMQ_CONTAINER_NAME:-rabbitmq-container}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app-network

  keycloak:
    image: keycloak/keycloak:26.6
    container_name: ${KEYCLOAK_CONTAINER_NAME:-keycloak-container}
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/${POSTGRES_DB_NAME_KEYCLOAK:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-admin}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-admin}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: 127.0.0.1
      KC_HOSTNAME_PORT: 8089
      KC_HOSTNAME_STRICT: false
      KC_IMPORT_OVERRIDE: true
      KC_FEATURES: token-exchange
    command: [ "start-dev" , "--import-realm" ]
    volumes:
      - ../keycloak/realm_config.json:/opt/keycloak/data/import/realm_config.json:ro
    ports:
      - "8081:8080"
    depends_on:
      - postgres-keycloak
    networks:
      - app-network

  redis:
    image: redis:8-alpine
    container_name: ${REDIS_CONTAINER_NAME:-redis-container}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
    name: ${REDIS_VOLUME:-redis-data}

networks:
  app-network:
    driver: bridge